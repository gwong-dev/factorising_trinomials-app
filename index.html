<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Mastery: Factorizing Trinomials</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --school-blue: #1e3a8a;
            --school-gold: #fbbf24;
        }
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .school-theme { border-top: 8px solid var(--school-blue); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden school-theme">
        <div class="p-6 md:p-8">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">Trinomial Factorization Prep</h1>
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-gray-100 pb-4">
                <div class="flex items-center gap-3">
                    <label for="problem-type" class="font-semibold text-gray-700">Practice Mode:</label>
                    <select id="problem-type" onchange="generateProblem()" class="p-2 border border-gray-300 rounded-lg bg-white text-gray-700 focus:outline-none focus:border-blue-500 shadow-sm">
                        <option value="mixed">Mixed Trinomials</option>
                        <option value="monic">Monic Only</option>
                        <option value="non-monic">Non-Monic Only</option>
                    </select>
                </div>
                
                <div class="bg-blue-50 text-blue-900 border border-blue-200 px-5 py-2 rounded-full font-bold shadow-sm flex gap-4 text-lg">
                    <span>Score: <span id="score-display">0</span></span>
                    <span class="text-blue-300">|</span>
                    <span class="text-amber-600">Streak: <span id="streak-display" class="text-amber-500">0</span> 🔥</span>
                </div>
            </div>

            <div class="bg-blue-50 p-8 rounded-lg text-center mb-8 border border-blue-100 shadow-inner min-h-[120px] flex items-center justify-center">
                <div id="equation-display" class="text-4xl font-serif text-gray-800">
                    </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Your Answer:</label>
                    <input type="text" id="user-input" placeholder="e.g., (m+2)(m-5)" 
                           class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none transition-all font-mono text-lg text-center">
                </div>
                <div class="flex items-end">
                    <button id="submit-btn" onclick="checkAnswer()" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                        Submit Answer
                    </button>
                </div>
            </div>

            <div id="feedback" class="hidden p-4 rounded-lg mb-6 font-medium text-center text-lg"></div>

            <div class="flex flex-wrap gap-4 border-t border-gray-100 pt-6">
                <button onclick="generateProblem()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-6 rounded-lg transition shadow-sm">
                    New Problem
                </button>
                <button id="hint-btn" onclick="showNextHint()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 font-semibold py-2 px-6 rounded-lg transition border border-amber-200 shadow-sm">
                    Show Hint Step
                </button>
            </div>

            <div id="hint-box" class="hidden mt-6 flex flex-col gap-2">
                </div>
        </div>
    </div>

    <script>
        // Game State
        let currentProblem = {};
        let score = 0;
        let streak = 0;
        let isProblemSolved = false;
        let currentHints = [];
        let hintIndex = 0;
        
        // Variables commonly used in textbooks
        const variables = ['a', 'b', 'c', 'd', 'e', 'g', 'h', 'k', 'm', 'n', 'p', 'q', 'r', 'u', 'v', 'w', 'x', 'y'];

        function getRandomVariable() {
            return variables[Math.floor(Math.random() * variables.length)];
        }

        function generateProblem() {
            // Reset UI
            document.getElementById('feedback').className = 'hidden p-4 rounded-lg mb-6 font-medium text-center text-lg';
            const hintBox = document.getElementById('hint-box');
            hintBox.innerHTML = '';
            hintBox.classList.add('hidden');
            document.getElementById('hint-btn').innerText = "Show Hint Step";
            document.getElementById('hint-btn').disabled = false;
            document.getElementById('hint-btn').classList.remove('opacity-50');
            
            document.getElementById('user-input').value = '';
            document.getElementById('user-input').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-50', 'cursor-not-allowed');
            
            isProblemSolved = false;
            hintIndex = 0;
            currentHints = [];

            const mode = document.getElementById('problem-type').value;
            let isMonic = false;
            
            if (mode === 'monic') isMonic = true;
            else if (mode === 'non-monic') isMonic = false;
            else isMonic = Math.random() > 0.5;

            const v = getRandomVariable();
            let a, m, n, p, q;

            if (isMonic) {
                // (v + m)(v + n)
                a = 1;
                m = Math.floor(Math.random() * 25) - 12; // Wider range -12 to +12
                n = Math.floor(Math.random() * 25) - 12;
                if (m === 0) m = 4; if (n === 0) n = -5; // Prevent missing terms
                
                const b = m + n;
                const c = m * n;

                currentProblem = {
                    a: 1, b: b, c: c, v: v,
                    answer1: `(${v}${m>0?'+':''}${m})(${v}${n>0?'+':''}${n})`,
                    answer2: `(${v}${n>0?'+':''}${n})(${v}${m>0?'+':''}${m})`,
                    type: 'monic'
                };

                currentHints = [
                    `**Step 1:** We need to find two numbers that multiply to give the constant term, **\\(${c}\\)**.`,
                    `**Step 2:** Those same two numbers must add to give the middle coefficient, **\\(${b}\\)**.`,
                    `**Step 3:** The numbers that work are **\\(${m}\\)** and **\\(${n}\\)**.`,
                    `**Final Step:** Write the expression in the form \\((${v} + \\text{first number})(${v} + \\text{second number})\\).`
                ];

            } else {
                // (pv + r)(qv + s) = (pq)v^2 + (ps + rq)v + rs
                p = Math.floor(Math.random() * 4) + 2; // 2 to 5
                q = Math.floor(Math.random() * 3) + 2; // 2 to 4
                let r = Math.floor(Math.random() * 15) - 7;
                let s = Math.floor(Math.random() * 15) - 7;
                if (r === 0) r = 2; if (s === 0) s = -3;

                const A = p * q;
                const B = p * s + r * q;
                const C = r * s;
                const f1 = p * s;
                const f2 = r * q;

                currentProblem = {
                    a: A, b: B, c: C, v: v,
                    answer1: `(${p === 1 ? '' : p}${v}${r>0?'+':''}${r})(${q === 1 ? '' : q}${v}${s>0?'+':''}${s})`,
                    answer2: `(${q === 1 ? '' : q}${v}${s>0?'+':''}${s})(${p === 1 ? '' : p}${v}${r>0?'+':''}${r})`,
                    type: 'non-monic'
                };

                currentHints = [
                    `**Step 1:** Use the AC method. Multiply the leading coefficient and the constant: \\(a \\times c = ${A} \\times ${C} = \\mathbf{${A*C}}\\)`,
                    `**Step 2:** Find two factors of **\\(${A*C}\\)** that add up to the middle coefficient, **\\(${B}\\)**.`,
                    `**Step 3:** The factors are **\\(${f1}\\)** and **\\(${f2}\\)**. Use these to split the middle term: \\\\[ ${A}${v}^2 ${f1>0?'+':''}${f1}${v} ${f2>0?'+':''}${f2}${v} ${C>0?'+':''}${C} \\\\]`,
                    `**Step 4:** **Group in pairs:** Factorise the first two terms together, and the last two terms together.`,
                    `**Step 5:** Factor out the common binomial bracket to get your final answer.`
                ];
            }

            // Update placeholder text dynamically to match the current variable
            document.getElementById('user-input').placeholder = `e.g., (${v}+2)(${v}-3)`;

            renderEquation();
        }

        function renderEquation() {
            const {a, b, c, v} = currentProblem;
            
            // Formatting logic to avoid "1x" or "+ -5"
            let termA = a === 1 ? `${v}^2` : (a === -1 ? `-${v}^2` : `${a}${v}^2`);
            
            let termB = '';
            if (b > 1) termB = `+ ${b}${v}`;
            else if (b === 1) termB = `+ ${v}`;
            else if (b === -1) termB = `- ${v}`;
            else if (b < -1) termB = `- ${Math.abs(b)}${v}`;
            // If b === 0, it leaves termB blank

            let termC = '';
            if (c > 0) termC = `+ ${c}`;
            else if (c < 0) termC = `- ${Math.abs(c)}`;
            // If c === 0, leaves termC blank
            
            const element = document.getElementById('equation-display');
            element.innerHTML = `\\[ ${termA} ${termB} ${termC} \\]`;
            
            MathJax.typesetPromise([element]).catch((err) => console.log(err.message));
        }

        function checkAnswer() {
            if (isProblemSolved) return; 

            const rawInput = document.getElementById('user-input').value;
            // Remove spaces, fix brackets formatting just in case
            const input = rawInput.replace(/\s+/g, '');
            const fb = document.getElementById('feedback');
            
            const ans1 = currentProblem.answer1.replace(/\s+/g, '');
            const ans2 = currentProblem.answer2.replace(/\s+/g, '');

            if (input === ans1 || input === ans2) {
                // Correct Answer
                isProblemSolved = true;
                streak++;
                score++; // Increment by exactly 1 as requested
                
                updateScoreBoard();
                
                fb.innerText = `Spot on! Correct. (+1 pt)`;
                fb.classList.remove('hidden');
                fb.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-300');
                
                // Lock inputs
                document.getElementById('user-input').disabled = true;
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').classList.add('opacity-50', 'cursor-not-allowed');
                document.getElementById('hint-btn').disabled = true;
                document.getElementById('hint-btn').classList.add('opacity-50');

            } else {
                // Incorrect Answer
                streak = 0;
                updateScoreBoard();
                
                fb.innerText = "Not quite. Check your signs and factors. Try again!";
                fb.classList.remove('hidden');
                fb.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-300');
            }
        }

        function updateScoreBoard() {
            document.getElementById('score-display').innerText = score;
            document.getElementById('streak-display').innerText = streak;
        }

        function showNextHint() {
            if (hintIndex < currentHints.length) {
                const hintBox = document.getElementById('hint-box');
                hintBox.classList.remove('hidden');
                
                // Create a new div for the hint
                const newHint = document.createElement('div');
                newHint.className = 'p-3 bg-amber-50 border-l-4 border-amber-400 text-gray-800 rounded-r-md shadow-sm';
                newHint.innerHTML = currentHints[hintIndex];
                
                hintBox.appendChild(newHint);
                
                // Tell MathJax to render the math in the new hint
                MathJax.typesetPromise([newHint]).catch((err) => console.log(err.message));
                
                hintIndex++;
                
                // If out of hints, disable the button
                if (hintIndex >= currentHints.length) {
                    const btn = document.getElementById('hint-btn');
                    btn.innerText = "All Hints Shown";
                    btn.disabled = true;
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            }
        }

        // Allow pressing "Enter" in the input field to submit
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkAnswer();
            }
        });

        // Initialize first problem on load
        window.onload = generateProblem;
    </script>
</body>
</html>
